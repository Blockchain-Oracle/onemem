<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
  <title id="title">OneMem X header</title>
  <desc id="desc">Profile header for x.com/OneMemAI showing one persistent memory layer across runtimes.</desc>
  <defs>
    <pattern id="grid" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M96 0H0v96" fill="none" stroke="#202838" stroke-width="1" opacity=".62"/>
    </pattern>
    <pattern id="tight-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#202838" stroke-width="1" opacity=".45"/>
    </pattern>
    <linearGradient id="dark-sheen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0a0f18"/>
      <stop offset=".52" stop-color="#080a0f"/>
      <stop offset="1" stop-color="#10141e"/>
    </linearGradient>
    <linearGradient id="paper-sheen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#faf8f5"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity=".24"/>
    </filter>
    <filter id="small-shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <marker id="arrow-violet" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#8f7cff"/>
    </marker>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#0090ff"/>
    </marker>
    <marker id="arrow-lime" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#d4ff5e"/>
    </marker>
  </defs>
  <style>
    .display{font-family:Bricolage Grotesque, Hanken Grotesk, Inter, Arial, sans-serif;font-weight:800;letter-spacing:0}
    .body{font-family:Hanken Grotesk, Inter, Arial, sans-serif;font-weight:500;letter-spacing:0}
    .mono{font-family:JetBrains Mono, SFMono-Regular, Consolas, monospace;font-weight:600;letter-spacing:0}
    .small{font-family:Hanken Grotesk, Inter, Arial, sans-serif;font-weight:700;letter-spacing:0}
  </style>
  
  <rect width="1500" height="500" fill="url(#dark-sheen)"/>
  <rect width="1500" height="500" fill="url(#grid)" opacity=".75"/>
  <rect x="0" y="360" width="330" height="140" fill="#080a0f" opacity=".55"/>
  <path d="M118 298h210l96-6h188l106 32h188l86-92h370" fill="none" stroke="#8f7cff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M992 232h370" fill="none" stroke="#0090ff" stroke-width="3" stroke-linecap="round" opacity=".82"/>
  <circle cx="118" cy="298" r="13" fill="#8f7cff"/>
  <circle cx="424" cy="292" r="13" fill="#8f7cff"/>
  <circle cx="718" cy="324" r="13" fill="#8f7cff"/>
  <circle cx="992" cy="232" r="13" fill="#0090ff"/>
  <circle cx="1362" cy="232" r="19" fill="#d4ff5e"/>
  <path d="m1351 231 9 9 18-23" fill="none" stroke="#171717" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(104 72) scale(1.375)">
    <rect width="64" height="64" rx="14" fill="#171717"/>
    <path d="M18 22.5 32 15l14 7.5v18.8L32 49l-14-7.7z" fill="none" stroke="#d4ff5e" stroke-width="4" stroke-linejoin="round"/>
    <path d="M18 22.5 32 30l14-7.5M32 30v19" fill="none" stroke="#8f7cff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="display" x="216" y="130" fill="#fffdf8" font-size="78">OneMem</text>
  <text class="display" x="106" y="218" fill="#fffdf8" font-size="50">One memory layer for every agent.</text>
  <text class="body" x="108" y="266" fill="#b9b6ad" font-size="26">Decentralized persistent memory for AI agents.</text>
  <g filter="url(#small-shadow)">
    <rect x="108" y="332" width="92" height="44" rx="8" fill="#161223" stroke="#8f7cff" stroke-width="1.5" opacity=".96"/>
    <circle cx="130" cy="354" r="6" fill="#8f7cff"/>
    <text class="mono" x="148" y="360" fill="#fffdf8" font-size="15">SDK</text>
  </g>
  <g filter="url(#small-shadow)">
    <rect x="218" y="332" width="94" height="44" rx="8" fill="#0b1b29" stroke="#0090ff" stroke-width="1.5" opacity=".96"/>
    <circle cx="240" cy="354" r="6" fill="#0090ff"/>
    <text class="mono" x="258" y="360" fill="#fffdf8" font-size="15">MCP</text>
  </g>
  <g filter="url(#small-shadow)">
    <rect x="330" y="332" width="126" height="44" rx="8" fill="#161223" stroke="#8f7cff" stroke-width="1.5" opacity=".96"/>
    <circle cx="352" cy="354" r="6" fill="#8f7cff"/>
    <text class="mono" x="370" y="360" fill="#fffdf8" font-size="15">Plugins</text>
  </g>
  <g filter="url(#small-shadow)">
    <rect x="474" y="332" width="156" height="44" rx="8" fill="#161223" stroke="#8f7cff" stroke-width="1.5" opacity=".96"/>
    <circle cx="496" cy="354" r="6" fill="#8f7cff"/>
    <text class="mono" x="514" y="360" fill="#fffdf8" font-size="15">Frameworks</text>
  </g>
  <text class="mono" x="1112" y="400" fill="#fffdf8" font-size="25">onememe.xyz</text>
  <g>
    <rect x="1112" y="408" width="32" height="32" rx="4" fill="#fffdf8"/>
    <image href="data:image/svg+xml;base64," x="1117" y="413" width="22" height="22" preserveAspectRatio="xMidYMid meet"/>
    <text class="mono" x="1154" y="436" fill="#d4ff5e" font-size="23">x.com/OneMemAI</text>
  </g>

</svg>
