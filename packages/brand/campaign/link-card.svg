<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">OneMem start here link card</title>
  <desc id="desc">A social link card listing OneMem public links and package entry points.</desc>
  <defs>
    <pattern id="grid" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M96 0H0v96" fill="none" stroke="#202838" stroke-width="1" opacity=".62"/>
    </pattern>
    <pattern id="tight-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#202838" stroke-width="1" opacity=".45"/>
    </pattern>
    <linearGradient id="dark-sheen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0a0f18"/>
      <stop offset=".52" stop-color="#080a0f"/>
      <stop offset="1" stop-color="#10141e"/>
    </linearGradient>
    <linearGradient id="paper-sheen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#faf8f5"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity=".24"/>
    </filter>
    <filter id="small-shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <marker id="arrow-violet" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#8f7cff"/>
    </marker>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#0090ff"/>
    </marker>
    <marker id="arrow-lime" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#d4ff5e"/>
    </marker>
  </defs>
  <style>
    .display{font-family:Bricolage Grotesque, Hanken Grotesk, Inter, Arial, sans-serif;font-weight:800;letter-spacing:0}
    .body{font-family:Hanken Grotesk, Inter, Arial, sans-serif;font-weight:500;letter-spacing:0}
    .mono{font-family:JetBrains Mono, SFMono-Regular, Consolas, monospace;font-weight:600;letter-spacing:0}
    .small{font-family:Hanken Grotesk, Inter, Arial, sans-serif;font-weight:700;letter-spacing:0}
  </style>
  
  <rect width="1200" height="630" fill="url(#paper-sheen)"/>
  <rect x="52" y="52" width="1096" height="526" rx="8" fill="#fffdf8" stroke="#e4ded1" stroke-width="2"/>
  <rect x="52" y="52" width="502" height="526" rx="8" fill="#0a0f18"/>
  <rect x="52" y="52" width="502" height="526" rx="8" fill="url(#tight-grid)" opacity=".74"/>
  <g transform="translate(98 104) scale(1.34375)">
    <rect width="64" height="64" rx="14" fill="#171717"/>
    <path d="M18 22.5 32 15l14 7.5v18.8L32 49l-14-7.7z" fill="none" stroke="#d4ff5e" stroke-width="4" stroke-linejoin="round"/>
    <path d="M18 22.5 32 30l14-7.5M32 30v19" fill="none" stroke="#8f7cff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="display" x="204" y="158" fill="#fffdf8" font-size="62">OneMem</text>
  <text class="display" x="98" y="244" fill="#fffdf8" font-size="46">Start here.</text>
  <text class="body" x="100" y="292" fill="#b9b6ad" font-size="25">Decentralized persistent memory</text>
  <text class="body" x="100" y="324" fill="#b9b6ad" font-size="25">for AI agents.</text>
  <g filter="url(#small-shadow)">
    <rect x="100" y="344" width="330" height="78" rx="8" fill="#fffdf8" stroke="#d4ff5e" stroke-width="2"/>
    <rect x="118" y="362" width="36" height="36" rx="6" fill="#0a0f18"/>
    <path d="M127 376h18M127 386h13" stroke="#d4ff5e" stroke-width="3" stroke-linecap="round"/>
    <text class="small" x="170" y="375" fill="#171717" font-size="18">memory.add()</text>
    <text class="mono" x="170" y="399" fill="#5f6572" font-size="12">Seal encrypted Walrus blob</text>
  </g>
  <g filter="url(#small-shadow)">
    <rect x="144" y="442" width="330" height="78" rx="8" fill="#fffdf8" stroke="#8f7cff" stroke-width="2"/>
    <rect x="162" y="460" width="36" height="36" rx="6" fill="#0a0f18"/>
    <path d="M171 474h18M171 484h13" stroke="#8f7cff" stroke-width="3" stroke-linecap="round"/>
    <text class="small" x="214" y="473" fill="#171717" font-size="18">memory.search()</text>
    <text class="mono" x="214" y="497" fill="#5f6572" font-size="12">same context, every runtime</text>
  </g>
  <text class="mono" x="100" y="540" fill="#d4ff5e" font-size="18">One memory layer for every agent.</text>
  <text class="display" x="612" y="118" fill="#171717" font-size="46">Relevant links</text>
  <text class="body" x="614" y="156" fill="#5f6572" font-size="20">Campaign, source, packages, docs, and social handle.</text>
  <g>
        <rect x="612" y="185" width="482" height="38" rx="8" fill="#fffdf8" stroke="#e7e1d5"/>
        <circle cx="638" cy="204" r="6" fill="#d4ff5e"/>
        <text class="mono" x="660" y="209" fill="#5f6572" font-size="13">Domain</text>
        <text class="small" x="756" y="209" fill="#171717" font-size="16">onememe.xyz</text>
      </g>
<g>
        <rect x="612" y="233" width="482" height="38" rx="8" fill="#fffdf8" stroke="#e7e1d5"/>
        <circle cx="638" cy="252" r="6" fill="#8f7cff"/>
        <text class="mono" x="660" y="257" fill="#5f6572" font-size="13">GitHub</text>
        <text class="small" x="756" y="257" fill="#171717" font-size="16">github.com/Blockchain-Oracle/onemem</text>
      </g>
<g>
        <rect x="612" y="281" width="482" height="38" rx="8" fill="#fffdf8" stroke="#e7e1d5"/>
        <circle cx="638" cy="300" r="6" fill="#0090ff"/>
        <text class="mono" x="660" y="305" fill="#5f6572" font-size="13">Docs</text>
        <text class="small" x="756" y="305" fill="#171717" font-size="16">docs.onemem.ai</text>
      </g>
<g>
        <rect x="612" y="329" width="482" height="38" rx="8" fill="#fffdf8" stroke="#e7e1d5"/>
        <circle cx="638" cy="348" r="6" fill="#8f7cff"/>
        <text class="mono" x="660" y="353" fill="#5f6572" font-size="13">npm</text>
        <text class="small" x="756" y="353" fill="#171717" font-size="16">npmjs.com/package/@onemem/sdk-ts</text>
      </g>
<g>
        <rect x="612" y="377" width="482" height="38" rx="8" fill="#fffdf8" stroke="#e7e1d5"/>
        <circle cx="638" cy="396" r="6" fill="#8f7cff"/>
        <text class="mono" x="660" y="401" fill="#5f6572" font-size="13">MCP</text>
        <text class="small" x="756" y="401" fill="#171717" font-size="16">npmjs.com/package/@onemem/mcp</text>
      </g>
<g>
        <rect x="612" y="425" width="482" height="38" rx="8" fill="#fffdf8" stroke="#e7e1d5"/>
        <circle cx="638" cy="444" r="6" fill="#16a34a"/>
        <text class="mono" x="660" y="449" fill="#5f6572" font-size="13">PyPI</text>
        <text class="small" x="756" y="449" fill="#171717" font-size="16">pypi.org/project/hermes-onemem</text>
      </g>
<g>
        <rect x="612" y="473" width="482" height="38" rx="8" fill="#fffdf8" stroke="#e7e1d5"/>
        <image href="data:image/svg+xml;base64," x="630" y="483" width="16" height="16" preserveAspectRatio="xMidYMid meet"/>
        <text class="mono" x="660" y="497" fill="#5f6572" font-size="13">X</text>
        <text class="small" x="756" y="497" fill="#171717" font-size="16">x.com/OneMemAI</text>
      </g>

</svg>
