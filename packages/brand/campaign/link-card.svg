<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">OneMem start here link card</title>
  <desc id="desc">A social link card listing OneMem public links and package entry points.</desc>
  <defs>
    <pattern id="grid" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M96 0H0v96" fill="none" stroke="#242831" stroke-width="1" opacity=".62"/>
    </pattern>
    <pattern id="tight-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#242831" stroke-width="1" opacity=".45"/>
    </pattern>
    <pattern id="paper-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0v32" fill="none" stroke="#e1dfdb" stroke-width="1" opacity=".82"/>
    </pattern>
    <linearGradient id="dark-sheen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#15171b"/>
      <stop offset=".52" stop-color="#0f1014"/>
      <stop offset="1" stop-color="#17191e"/>
    </linearGradient>
    <linearGradient id="paper-sheen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fdfcf9"/>
      <stop offset="1" stop-color="#fdfcf9"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity=".24"/>
    </filter>
    <filter id="small-shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <marker id="arrow-violet" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#3959da"/>
    </marker>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#008cc0"/>
    </marker>
    <marker id="arrow-lime" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#0a924b"/>
    </marker>
  </defs>
  <style>
    .display{font-family:Bricolage Grotesque, Hanken Grotesk, Inter, Arial, sans-serif;font-weight:800;letter-spacing:0}
    .body{font-family:Hanken Grotesk, Inter, Arial, sans-serif;font-weight:500;letter-spacing:0}
    .mono{font-family:JetBrains Mono, SFMono-Regular, Consolas, monospace;font-weight:600;letter-spacing:0}
    .small{font-family:Hanken Grotesk, Inter, Arial, sans-serif;font-weight:700;letter-spacing:0}
  </style>
  
  <rect width="1200" height="630" fill="url(#paper-sheen)"/>
  <rect width="1200" height="630" fill="url(#paper-grid)" opacity=".72"/>
  <rect x="52" y="52" width="1096" height="526" rx="8" fill="#ffffff" stroke="#e1dfdb" stroke-width="2"/>
  <rect x="52" y="52" width="502" height="526" rx="8" fill="#15171b"/>
  <rect x="52" y="52" width="502" height="526" rx="8" fill="url(#tight-grid)" opacity=".74"/>
  <g transform="translate(100 104) scale(1.0625)">
    <rect width="64" height="64" rx="14" fill="#15171b"/>
    <path d="M18 22.5 32 15l14 7.5v18.8L32 49l-14-7.7z" fill="none" stroke="#0a924b" stroke-width="4" stroke-linejoin="round"/>
    <path d="M18 22.5 32 30l14-7.5M32 30v19" fill="none" stroke="#3959da" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="display" x="188" y="154" fill="#ffffff" font-size="54">OneMem</text>
  <text class="display" x="100" y="236" fill="#ffffff" font-size="44">Start here.</text>
  <text class="body" x="100" y="286" fill="#c9c5bd" font-size="24">Decentralized memory</text>
  <text class="body" x="100" y="318" fill="#c9c5bd" font-size="24">for AI agents.</text>
  <g filter="url(#small-shadow)">
    <rect x="100" y="344" width="330" height="78" rx="8" fill="#ffffff" stroke="#0a924b" stroke-width="2"/>
    <rect x="118" y="362" width="36" height="36" rx="6" fill="#15171b"/>
    <path d="M127 376h18M127 386h13" stroke="#0a924b" stroke-width="3" stroke-linecap="round"/>
    <text class="small" x="170" y="375" fill="#221d18" font-size="18">memory.add()</text>
    <text class="mono" x="170" y="399" fill="#68625c" font-size="12">Seal encrypted Walrus blob</text>
  </g>
  <g filter="url(#small-shadow)">
    <rect x="144" y="442" width="330" height="78" rx="8" fill="#ffffff" stroke="#3959da" stroke-width="2"/>
    <rect x="162" y="460" width="36" height="36" rx="6" fill="#15171b"/>
    <path d="M171 474h18M171 484h13" stroke="#3959da" stroke-width="3" stroke-linecap="round"/>
    <text class="small" x="214" y="473" fill="#221d18" font-size="18">memory.search()</text>
    <text class="mono" x="214" y="497" fill="#68625c" font-size="12">same context, every runtime</text>
  </g>
  <text class="mono" x="100" y="540" fill="#0a924b" font-size="18">One memory layer for every agent.</text>
  <text class="display" x="612" y="118" fill="#221d18" font-size="46">Relevant links</text>
  <text class="body" x="614" y="156" fill="#68625c" font-size="20">Source, docs, packages, Python, MCP, and social.</text>
  <g>
        <rect x="612" y="171" width="482" height="38" rx="8" fill="#ffffff" stroke="#e1dfdb"/>
        <g transform="translate(628 176) scale(0.34375)">
    <rect width="64" height="64" rx="14" fill="#15171b"/>
    <path d="M18 22.5 32 15l14 7.5v18.8L32 49l-14-7.7z" fill="none" stroke="#0a924b" stroke-width="4" stroke-linejoin="round"/>
    <path d="M18 22.5 32 30l14-7.5M32 30v19" fill="none" stroke="#3959da" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
        <text class="mono" x="660" y="195" fill="#68625c" font-size="13">Domain</text>
        <text class="small" x="756" y="195" fill="#221d18" font-size="15">onemem.xyz</text>
      </g>
<g>
        <rect x="612" y="214" width="482" height="38" rx="8" fill="#ffffff" stroke="#e1dfdb"/>
        <image href="data:image/svg+xml;base64," x="630" y="223" width="17" height="17" preserveAspectRatio="xMidYMid meet"/>
        <text class="mono" x="660" y="238" fill="#68625c" font-size="13">GitHub</text>
        <text class="small" x="756" y="238" fill="#221d18" font-size="15">github.com/Blockchain-Oracle/onemem</text>
      </g>
<g>
        <rect x="612" y="257" width="482" height="38" rx="8" fill="#ffffff" stroke="#e1dfdb"/>
        <g>
    <path d="M631 265h10l7 7v16H631z" fill="#ffffff" stroke="#008cc0" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M642 266v7h6" fill="none" stroke="#008cc0" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M635 275.2h9M635 278.8h7" stroke="#008cc0" stroke-width="1.8" stroke-linecap="round"/>
  </g>
        <text class="mono" x="660" y="281" fill="#68625c" font-size="13">Docs</text>
        <text class="small" x="756" y="281" fill="#221d18" font-size="15">docs.onemem.xyz</text>
      </g>
<g>
        <rect x="612" y="300" width="482" height="38" rx="8" fill="#ffffff" stroke="#e1dfdb"/>
        <image href="data:image/svg+xml;base64," x="630" y="309" width="17" height="17" preserveAspectRatio="xMidYMid meet"/>
        <text class="mono" x="660" y="324" fill="#68625c" font-size="13">npm</text>
        <text class="small" x="756" y="324" fill="#221d18" font-size="15">npmjs.com/package/@onemem/sdk-ts</text>
      </g>
<g>
        <rect x="612" y="343" width="482" height="38" rx="8" fill="#ffffff" stroke="#e1dfdb"/>
        <image href="data:image/svg+xml;base64," x="630" y="352" width="17" height="17" preserveAspectRatio="xMidYMid meet"/>
        <text class="mono" x="660" y="367" fill="#68625c" font-size="13">MCP</text>
        <text class="small" x="756" y="367" fill="#221d18" font-size="15">npmjs.com/package/@onemem/mcp</text>
      </g>
<g>
        <rect x="612" y="386" width="482" height="38" rx="8" fill="#ffffff" stroke="#e1dfdb"/>
        <image href="data:image/svg+xml;base64," x="630" y="395" width="17" height="17" preserveAspectRatio="xMidYMid meet"/>
        <text class="mono" x="660" y="410" fill="#68625c" font-size="13">PyPI</text>
        <text class="small" x="756" y="410" fill="#221d18" font-size="15">pypi.org/project/hermes-onemem</text>
      </g>
<g>
        <rect x="612" y="429" width="482" height="38" rx="8" fill="#ffffff" stroke="#e1dfdb"/>
        <image href="data:image/svg+xml;base64," x="630" y="438" width="17" height="17" preserveAspectRatio="xMidYMid meet"/>
        <text class="mono" x="660" y="453" fill="#68625c" font-size="13">Python</text>
        <text class="small" x="756" y="453" fill="#221d18" font-size="15">github.com/.../packages/sdk-python</text>
      </g>
<g>
        <rect x="612" y="472" width="482" height="38" rx="8" fill="#ffffff" stroke="#e1dfdb"/>
        <image href="data:image/svg+xml;base64," x="630" y="481" width="17" height="17" preserveAspectRatio="xMidYMid meet"/>
        <text class="mono" x="660" y="496" fill="#68625c" font-size="13">X</text>
        <text class="small" x="756" y="496" fill="#221d18" font-size="15">x.com/OneMemAI</text>
      </g>

</svg>
