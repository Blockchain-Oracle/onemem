<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneMem — Campaign Brand Kit</title>
<link rel="stylesheet" href="_ds/cdr-kit-design-system-b3bc5571-372a-4a81-938d-86cd31baa5e7/colors_and_type.css">
<style>
  html, body { margin: 0; background: #0b0f17; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="kit/parts.jsx"></script>
<script type="text/babel" src="kit/assets-a.jsx"></script>
<script type="text/babel" src="kit/assets-b.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="readme" title="README hero" subtitle="GitHub banner — shallow & readable">
        <DCArtboard id="hero" label="hero · 1280×420" width={1280} height={420}><HeroBanner /></DCArtboard>
      </DCSection>

      <DCSection id="social" title="Social" subtitle="X header & link card">
        <DCArtboard id="xheader" label="X header · 1500×500" width={1500} height={500}><XHeader /></DCArtboard>
        <DCArtboard id="linkcard" label="link card · 1200×630" width={1200} height={630}><LinkCard /></DCArtboard>
      </DCSection>

      <DCSection id="explain" title="Explainers" subtitle="Tools poster & architecture">
        <DCArtboard id="poster" label="tools poster · 1600×900" width={1600} height={900}><ToolsPoster /></DCArtboard>
        <DCArtboard id="arch" label="architecture · 1920×1080" width={1920} height={1080}><Architecture /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
