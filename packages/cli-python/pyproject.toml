[project]
name = "onemem-cli"
version = "0.1.0"
description = "OneMem CLI (Python build) — alternative to @onemem/cli for Python-first environments"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "OneMem contributors" }]
dependencies = [
    "onemem-sdk-python",
    "click>=8.1",
]

[project.scripts]
onemem-py = "onemem_cli.main:cli"

[project.urls]
Homepage = "https://onemem.xyz"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["onemem_cli"]

[tool.uv.sources]
onemem-sdk-python = { workspace = true }
