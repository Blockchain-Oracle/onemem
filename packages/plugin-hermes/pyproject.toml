[project]
name = "hermes-onemem"
version = "0.1.0"
description = "OneMem plugin for Hermes — verifiable on-chain action traces for Hermes agents"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "OneMem contributors" }]
dependencies = [
    "onemem-sdk-python",
]

[project.urls]
Homepage = "https://onemem.ai"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["hermes_onemem"]

[tool.uv.sources]
onemem-sdk-python = { workspace = true }
