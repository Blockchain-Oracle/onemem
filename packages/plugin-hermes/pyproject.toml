[project]
name = "hermes-onemem"
version = "0.2.0"
description = "OneMem memory provider for Hermes — records each agent session as a verifiable on-chain TraceSession (Sui + Walrus + Seal)"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "OneMem contributors" }]
# Pure-stdlib: the provider buffers turns and shells out to the `onemem-trace`
# Node CLI (@onemem/sdk-ts) for the full-fidelity on-chain write — no Python
# Sui/Walrus/Seal deps. hermes-agent is the host runtime (provided at install),
# not a build dependency.
dependencies = []

[project.scripts]
hermes-onemem = "hermes_onemem.install:main"

[project.urls]
Homepage = "https://onemem.xyz"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["hermes_onemem"]
