[project]
name = "hermes-onemem"
version = "0.2.0"
description = "OneMem memory provider for Hermes — decentralized memory for each agent session, stored on MemWal"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "OneMem contributors" }]
# The provider recalls/captures memory through onemem-sdk-python's ProviderMemory,
# which shells out to the `onemem-memory` Node bridge (@onemem/sdk-ts) for the
# full MemWal round-trip. hermes-agent is the host runtime (provided at install),
# not a build dependency.
dependencies = [
    "onemem-sdk-python>=0.2.0",
]

[project.scripts]
hermes-onemem = "hermes_onemem.install:main"

[project.urls]
Homepage = "https://onemem.xyz"

[tool.uv.sources]
onemem-sdk-python = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["hermes_onemem"]
