[project]
name = "onemem-elevenlabs"
version = "0.1.0"
description = "OneMem provider for ElevenLabs Conversational AI — verifiable trace for ElevenLabs voice agents"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "OneMem contributors" }]
dependencies = [
    "onemem-sdk-python",
    "elevenlabs>=1.10",
]

[project.urls]
Homepage = "https://onemem.ai"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["onemem_elevenlabs"]

[tool.uv.sources]
onemem-sdk-python = { workspace = true }
