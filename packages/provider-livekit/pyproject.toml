[project]
name = "onemem-livekit"
version = "0.1.1"
description = "OneMem provider for LiveKit Agents — decentralized memory for voice sessions, stored on MemWal"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "OneMem contributors" }]
# Memory recall/capture via onemem-sdk-python's ProviderMemory, which shells out
# to the `onemem-memory` Node CLI (@onemem/sdk-ts) for the MemWal round-trip.
# livekit-agents is the host runtime (provided at install), not a build dependency.
dependencies = [
    "onemem-sdk-python>=0.2.0",
]

[project.urls]
Homepage = "https://onemem.xyz"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["onemem_livekit"]

[tool.uv.sources]
onemem-sdk-python = { workspace = true }
