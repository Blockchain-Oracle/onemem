[project]
name = "onemem-livekit"
version = "0.1.0"
description = "OneMem provider for LiveKit Agents — verifiable trace for voice agents"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "OneMem contributors" }]
dependencies = [
    "onemem-sdk-python",
    "livekit-agents>=0.10",
]

[project.urls]
Homepage = "https://onemem.ai"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["onemem_livekit"]

[tool.uv.sources]
onemem-sdk-python = { workspace = true }
