[project]
name = "onemem-crewai"
version = "0.1.0"
description = "OneMem provider for CrewAI — record crew runs as verifiable on-chain action traces"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "OneMem contributors" }]
# Pure-stdlib: the tracer receives CrewAI's callback objects and shells out to
# the `onemem-trace` Node CLI (@onemem/sdk-ts) for the on-chain write — no
# Python Sui/Walrus/Seal deps. crewai is the host runtime (provided), not a dep.
dependencies = []

[project.urls]
Homepage = "https://onemem.ai"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["onemem_crewai"]
