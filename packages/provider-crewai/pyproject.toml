[project]
name = "onemem-crewai"
version = "0.1.0"
description = "OneMem provider for CrewAI — verifiable memory + trace for multi-agent crews"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "OneMem contributors" }]
dependencies = [
    "onemem-sdk-python",
    "crewai>=0.60",
]

[project.urls]
Homepage = "https://onemem.ai"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["onemem_crewai"]

[tool.uv.sources]
onemem-sdk-python = { workspace = true }
