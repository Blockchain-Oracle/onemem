[project]
name = "onemem-sdk-python"
version = "0.1.0"
description = "OneMem Python SDK — verifiable memory + trace SDK for AI agents on Sui + Walrus + Seal + MemWal"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "OneMem contributors" }]
dependencies = [
    "pysui>=0.79",
    "httpx>=0.27",
    "pydantic>=2.9",
]

[project.urls]
Homepage = "https://onemem.ai"
Documentation = "https://docs.onemem.ai"
Repository = "https://github.com/onemem/onemem"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["onemem"]
