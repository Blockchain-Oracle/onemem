[project]
name = "onemem-sdk-python"
version = "0.2.0"
description = "OneMem Python SDK — decentralized memory for AI agents, stored on MemWal (Seal + Walrus)"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [{ name = "OneMem contributors" }]
# v0.1 is the read-only verifier (httpx + stdlib hashlib only). pysui is
# re-added when the write-path PTBs (namespace/session creation) land.
dependencies = [
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://onemem.xyz"
Documentation = "https://docs.onemem.xyz"
Repository = "https://github.com/Blockchain-Oracle/onemem"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["onemem"]
