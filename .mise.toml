[tools]
# Node 24: stable, unflagged `node:sqlite` (the local worker + memory index use
# it). Node 20.18 lacks node:sqlite (ERR_UNKNOWN_BUILTIN_MODULE), so it never
# actually ran the worker/index at runtime.
node = "24"
pnpm = "10.33.0"
python = "3.12"
uv = "latest"
rust = "stable"
# sui: install locally via `brew install sui` (no prebuilt arm64 mise asset → mise would build from source).
# CI installs the pinned prebuilt linux binary directly (see .github/workflows/ci.yml). Keep the version in sync.

[env]
ONEMEM_REPO_ROOT = "{{config_root}}"
