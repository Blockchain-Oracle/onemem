name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Show toolchain
        run: |
          node --version
          pnpm --version
          uv --version

      - name: Install TS deps
        run: pnpm install --frozen-lockfile

      - name: Install Python deps
        run: uv sync --all-packages --frozen

      - name: Verify monorepo structure
        run: pnpm test:structure

      - name: Lint
        run: pnpm turbo run lint

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Test
        run: pnpm turbo run test

      - name: Build
        run: pnpm turbo run build

      # Real MemWal-testnet integration. NOT part of `pnpm test` — it runs only
      # when the MemWal secrets are configured (e.g. on the canonical repo, not on
      # forks/PRs without secrets), and prints a clear neutral skip otherwise so an
      # absent-secrets run is honestly "skipped", never silently green.
      - name: Integration (real MemWal testnet, gated on secrets)
        env:
          ONEMEM_DELEGATE_KEY: ${{ secrets.ONEMEM_DELEGATE_KEY }}
          ONEMEM_ACCOUNT_ID: ${{ secrets.ONEMEM_ACCOUNT_ID }}
          ONEMEM_EMBEDDING_API_KEY: ${{ secrets.ONEMEM_EMBEDDING_API_KEY }}
          MEMWAL_PACKAGE_ID: ${{ secrets.MEMWAL_PACKAGE_ID }}
          MEMWAL_RELAYER_URL: ${{ secrets.MEMWAL_RELAYER_URL }}
          ONEMEM_PRIVATE_KEY: ${{ secrets.ONEMEM_PRIVATE_KEY }}
          SUI_NETWORK: ${{ secrets.SUI_NETWORK }}
          ONEMEM_INTEGRATION: "1"
        run: |
          if [ -z "$ONEMEM_DELEGATE_KEY" ] || [ -z "$ONEMEM_ACCOUNT_ID" ] || [ -z "$ONEMEM_EMBEDDING_API_KEY" ] || [ -z "$MEMWAL_PACKAGE_ID" ]; then
            echo "::notice title=Integration skipped::MemWal secrets not configured — skipping the real testnet integration test (this is expected on forks/PRs without secrets)."
            exit 0
          fi
          pnpm test:integration

      - name: Python lint
        run: uv run ruff check .

      - name: Python typecheck
        run: uv run pyright

      - name: Python test
        run: uv run pytest packages/sdk-python packages/cli-python packages/plugin-hermes packages/provider-crewai packages/provider-livekit packages/provider-elevenlabs -q
