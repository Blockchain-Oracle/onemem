name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Install Sui CLI (pinned prebuilt linux binary)
        env:
          SUI_VERSION: testnet-v1.72.2
        run: |
          set -euo pipefail
          url="https://github.com/MystenLabs/sui/releases/download/${SUI_VERSION}/sui-${SUI_VERSION}-ubuntu-x86_64.tgz"
          echo "Downloading $url"
          curl -fsSL "$url" -o /tmp/sui.tgz
          mkdir -p /tmp/sui-bin
          tar -xzf /tmp/sui.tgz -C /tmp/sui-bin
          install -m 0755 "$(find /tmp/sui-bin -name sui -type f | head -n1)" /usr/local/bin/sui
          sui --version

      - name: Show toolchain
        run: |
          node --version
          pnpm --version
          uv --version
          sui --version

      - name: Install TS deps
        run: pnpm install --frozen-lockfile

      - name: Install Python deps
        run: uv sync --all-packages --frozen

      - name: Verify monorepo structure
        run: pnpm test:structure

      - name: Verify deterministic demo matrix
        run: pnpm test:demo-matrix

      - name: Lint
        run: pnpm turbo run lint

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Test
        run: pnpm turbo run test

      - name: Build
        run: pnpm turbo run build

      - name: Move build + test
        working-directory: contracts/onemem
        run: |
          sui move build
          sui move test

      - name: Python lint
        run: uv run ruff check .

      - name: Python typecheck
        run: uv run pyright

      - name: Python test
        run: uv run pytest packages/sdk-python packages/cli-python packages/plugin-hermes packages/provider-crewai packages/provider-livekit packages/provider-elevenlabs -q
