name: Deploy Move contract

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        type: choice
        options:
          - testnet
          - mainnet
        default: testnet
      mode:
        description: "Initial publish or upgrade"
        required: true
        type: choice
        options:
          - publish
          - upgrade
        default: publish

concurrency:
  group: deploy-contract-${{ inputs.network }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: ${{ inputs.mode }} to ${{ inputs.network }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.network }}  # uses GitHub Environments for approval gates
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Configure Sui CLI
        env:
          SUI_KEYSTORE: ${{ secrets.SUI_KEYSTORE }}
        run: |
          mkdir -p ~/.sui/sui_config
          echo "$SUI_KEYSTORE" > ~/.sui/sui_config/sui.keystore
          sui client switch --env ${{ inputs.network }}

      - name: Build Move package
        working-directory: contracts/onemem
        run: sui move build

      - name: Run Move tests
        working-directory: contracts/onemem
        run: sui move test

      - name: Publish or upgrade
        run: |
          if [ "${{ inputs.mode }}" = "publish" ]; then
            bash scripts/deploy-contract.sh ${{ inputs.network }}
          else
            bash scripts/migrate-contract.sh ${{ inputs.network }}
          fi
