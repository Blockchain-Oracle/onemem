name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Publish TS packages via Changesets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      ONEMEM_NPM_TRUSTED_PUBLISHING: ${{ vars.ONEMEM_NPM_TRUSTED_PUBLISHING }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Use npm version with trusted publishing support
        run: npm install -g npm@latest

      - name: Install deps
        run: |
          pnpm install --frozen-lockfile
          uv sync --frozen

      - name: Build
        run: pnpm turbo run build

      - name: Verify publish toolchain
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Report registry publication preflight
        run: pnpm release:preflight

      - name: Report npm publish disabled
        if: ${{ env.NPM_TOKEN == '' && env.ONEMEM_NPM_TRUSTED_PUBLISHING != '1' && env.ONEMEM_NPM_TRUSTED_PUBLISHING != 'true' }}
        run: |
          echo "::notice::NPM_TOKEN is not configured and ONEMEM_NPM_TRUSTED_PUBLISHING is not enabled; creating/updating the Changesets release PR without publishing npm packages."

      - name: Create Release PR without npm publish
        if: ${{ env.NPM_TOKEN == '' && env.ONEMEM_NPM_TRUSTED_PUBLISHING != '1' && env.ONEMEM_NPM_TRUSTED_PUBLISHING != 'true' }}
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release PR or publish to npm
        if: ${{ env.NPM_TOKEN != '' || env.ONEMEM_NPM_TRUSTED_PUBLISHING == '1' || env.ONEMEM_NPM_TRUSTED_PUBLISHING == 'true' }}
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bash scripts/publish-all.sh ts
          version: pnpm changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ env.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
          NPM_CONFIG_ACCESS: public
          PUBLISH_ALL_NPM_PROVENANCE: "1"

      - name: Report PyPI publish disabled
        if: ${{ steps.changesets.outputs.published == 'true' && env.PYPI_TOKEN == '' }}
        run: |
          echo "::notice::PYPI_TOKEN is not configured; skipping Python package publication after npm publish."

      - name: Publish Python packages to PyPI
        if: ${{ steps.changesets.outputs.published == 'true' && env.PYPI_TOKEN != '' }}
        run: bash scripts/publish-all.sh python
        env:
          UV_PUBLISH_TOKEN: ${{ env.PYPI_TOKEN }}
