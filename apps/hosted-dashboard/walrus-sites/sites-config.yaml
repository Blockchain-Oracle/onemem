# Walrus Sites mirror notes for apps/hosted-dashboard.
# The deploy wrapper uses site-builder directly:
#   site-builder --context=<network> deploy --epochs <N> <dist>
#
# Keep this file as repo-local mirror metadata until the final static artifact
# and SuiNS object mapping are chosen.

# Build artifacts (static output)
source: ./out

# Suins domain (optional; set after first deploy)
# domain: onemem.wal.app

# Walrus storage epochs to fund. 26 epochs ≈ 6 months.
epochs: 26

# Force rebuild on every deploy (set false to reuse cached blobs)
force_refresh: false

# Resource routes — Walrus Sites maps URL paths to blobs.
routes:
  "/*": "out/$path"
